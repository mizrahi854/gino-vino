  <!DOCTYPE html>
  <html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <title>ניהול | GINO VINO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
      :root {
        --bg: #0d0d0d; --bg2: #111; --bg3: #1a1a1a;
        --gold: #d4af37; --gold2: #e8c94a;
        --text: #f0f0f0; --text2: #b0b0b0; --text3: #707070;
        --red: #c0392b; --green: #27ae60;
        --border: rgba(212,175,55,0.2);
        --radius: 10px; --tr: 0.25s ease;
      }
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
      body { background:var(--bg); color:var(--text); font-family:'Assistant',sans-serif; direction:rtl; min-height:100vh; }
      a { text-decoration:none; color:inherit; }
      button { cursor:pointer; font-family:'Assistant',sans-serif; }
      input, select, textarea { font-family:'Assistant',sans-serif; }

      /* LOGIN */
      #loginScreen {
        min-height:100vh; display:flex; align-items:center; justify-content:center;
        background: radial-gradient(ellipse at center, #1a1510 0%, var(--bg) 70%);
      }
      .login-box {
        background:var(--bg3); border:1px solid var(--border); border-radius:20px;
        padding:50px 40px; max-width:400px; width:100%; text-align:center;
        box-shadow:0 0 40px rgba(212,175,55,0.1);
      }
      .login-box h1 { color:var(--gold); font-size:2rem; margin-bottom:8px; }
      .login-box p  { color:var(--text2); margin-bottom:30px; }
      .login-box input {
        width:100%; background:var(--bg2); border:1px solid var(--border);
        border-radius:var(--radius); color:var(--text); padding:12px 16px;
        font-size:1rem; margin-bottom:16px; text-align:center; letter-spacing:2px;
      }
      .login-box input:focus { outline:none; border-color:var(--gold); }
      .login-btn {
        background:var(--gold); color:#000; border:none; padding:13px 40px;
        border-radius:50px; font-size:1rem; font-weight:700; width:100%;
        transition:all var(--tr);
      }
      .login-btn:hover { background:var(--gold2); transform:translateY(-2px); }
      .login-error { color:var(--red); font-size:0.9rem; margin-top:12px; display:none; }

      /* ADMIN PANEL */
      #adminPanel { display:none; }

      /* TOPBAR */
      .admin-topbar {
        background:var(--bg2); border-bottom:1px solid var(--border);
        padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
        position:sticky; top:0; z-index:100;
        backdrop-filter:blur(10px);
      }
      .admin-topbar h1 { color:var(--gold); font-size:1.4rem; font-weight:800; }
      .logout-btn {
        background:transparent; border:1px solid var(--border); color:var(--text2);
        padding:8px 18px; border-radius:8px; font-size:0.9rem; transition:all var(--tr);
      }
      .logout-btn:hover { border-color:var(--red); color:var(--red); }

      /* TABS */
      .admin-tabs {
        background:var(--bg2); border-bottom:1px solid var(--border);
        display:flex; padding:0 24px; gap:4px; overflow-x:auto;
      }
      .tab-btn {
        background:transparent; border:none; color:var(--text2); padding:14px 20px;
        font-size:0.95rem; font-weight:600; border-bottom:3px solid transparent;
        transition:all var(--tr); white-space:nowrap;
      }
      .tab-btn:hover { color:var(--gold); }
      .tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }

      /* TAB CONTENT */
      .tab-content { display:none; padding:30px 24px; max-width:1400px; margin:0 auto; }
      .tab-content.active { display:block; }

      /* TOOLBAR */
      .toolbar {
        display:flex; flex-wrap:wrap; gap:12px; align-items:center;
        margin-bottom:24px;
      }
      .search-input {
        background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
        color:var(--text); padding:10px 14px; font-size:0.95rem; flex:1; min-width:180px;
      }
      .search-input:focus { outline:none; border-color:var(--gold); }
      .cat-filter {
        background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
        color:var(--text); padding:10px 14px; font-size:0.95rem;
      }
      .action-btn {
        padding:10px 20px; border-radius:var(--radius); font-size:0.9rem; font-weight:600;
        border:none; transition:all var(--tr); display:flex; align-items:center; gap:6px;
      }
      .btn-gold  { background:var(--gold); color:#000; }
      .btn-gold:hover { background:var(--gold2); }
      .btn-red   { background:var(--red); color:#fff; }
      .btn-red:hover { opacity:0.85; }
      .btn-green { background:var(--green); color:#fff; }
      .btn-green:hover { opacity:0.85; }
      .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
      .btn-outline:hover { border-color:var(--gold); color:var(--gold); }

      /* PRODUCTS TABLE */
      .products-table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); }
      table { width:100%; border-collapse:collapse; }
      thead tr { background:rgba(212,175,55,0.07); }
      th { padding:12px 14px; text-align:right; color:var(--gold); font-size:0.85rem; font-weight:700; white-space:nowrap; }
      td { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.9rem; color:var(--text2); vertical-align:middle; }
      tr:last-child td { border-bottom:none; }
      tr:hover td { background:rgba(255,255,255,0.02); }

      .prod-name { color:var(--text); font-weight:600; }
      .inline-input {
        background:var(--bg2); border:1px solid var(--border); border-radius:6px;
        color:var(--text); padding:5px 8px; width:80px; font-size:0.88rem;
      }
      .inline-input:focus { outline:none; border-color:var(--gold); }

      /* Toggle switch */
      .toggle-wrap { display:flex; align-items:center; gap:8px; }
      .toggle {
        position:relative; width:44px; height:24px; cursor:pointer;
      }
      .toggle input { opacity:0; width:0; height:0; }
      .toggle-slider {
        position:absolute; inset:0; background:#444; border-radius:24px;
        transition:background var(--tr);
      }
      .toggle-slider::before {
        content:''; position:absolute; height:18px; width:18px;
        left:3px; bottom:3px; background:#fff; border-radius:50%;
        transition:transform var(--tr);
      }
      .toggle input:checked + .toggle-slider { background:var(--green); }
      .toggle input:checked + .toggle-slider::before { transform:translateX(20px); }

      .badge-active   { background:rgba(39,174,96,0.15); color:var(--green); padding:3px 10px; border-radius:50px; font-size:0.78rem; font-weight:700; }
      .badge-inactive { background:rgba(192,57,43,0.15); color:var(--red);   padding:3px 10px; border-radius:50px; font-size:0.78rem; font-weight:700; }

      .delete-btn {
        background:transparent; border:none; color:var(--text3); font-size:1rem;
        padding:4px 8px; border-radius:6px; transition:all var(--tr);
      }
      .delete-btn:hover { color:var(--red); background:rgba(192,57,43,0.1); }

      /* ADD PRODUCT FORM */
      .add-product-section {
        background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
        padding:24px; margin-bottom:24px;
      }
      .add-product-section h3 { color:var(--gold); margin-bottom:18px; font-size:1.1rem; }
      .add-form-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:16px; }
      .add-form-field { display:flex; flex-direction:column; gap:5px; }
      .add-form-field label { font-size:0.8rem; color:var(--text2); }
      .add-form-field input, .add-form-field select {
        background:var(--bg2); border:1px solid var(--border); border-radius:6px;
        color:var(--text); padding:8px 10px; font-size:0.9rem;
      }
      .add-form-field input:focus, .add-form-field select:focus { outline:none; border-color:var(--gold); }

      /* SETTINGS */
      .settings-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; }
      .setting-card {
        background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
        padding:22px;
      }
      .setting-card h3 { color:var(--gold); font-size:1rem; margin-bottom:16px; }
      .setting-field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
      .setting-field label { font-size:0.85rem; color:var(--text2); }
      .setting-field input {
        background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
        color:var(--text); padding:10px 12px; font-size:0.95rem;
      }
      .setting-field input:focus { outline:none; border-color:var(--gold); }
      .save-settings-btn {
        background:var(--gold); color:#000; border:none; padding:11px 28px;
        border-radius:50px; font-size:0.95rem; font-weight:700; transition:all var(--tr);
      }
      .save-settings-btn:hover { background:var(--gold2); }

      /* ORDERS */
      .order-card {
        background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
        padding:20px; margin-bottom:16px;
      }
      .order-header {
        display:flex; justify-content:space-between; align-items:center;
        margin-bottom:12px; flex-wrap:wrap; gap:8px;
      }
      .order-id   { color:var(--gold); font-weight:800; font-size:1.05rem; }
      .order-date { color:var(--text3); font-size:0.85rem; }
      .order-total{ color:var(--gold); font-weight:700; }
      .order-items { color:var(--text2); font-size:0.9rem; line-height:1.7; }
      .order-wa-btn {
        background:#25d366; color:#fff; border:none; padding:8px 18px; border-radius:8px;
        font-size:0.88rem; font-weight:600; transition:all var(--tr); margin-top:10px;
      }
      .order-wa-btn:hover { background:#20b857; }

      /* SAVE STATUS */
      .save-toast {
        position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
        background:var(--green); color:#fff; padding:12px 28px; border-radius:50px;
        font-weight:600; z-index:9999; opacity:0; transition:all 0.4s ease; pointer-events:none;
      }
      .save-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

      /* Pagination */
      .pagination { display:flex; gap:8px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
      .page-btn {
        background:var(--bg3); border:1px solid var(--border); color:var(--text2);
        padding:6px 14px; border-radius:8px; font-size:0.9rem; transition:all var(--tr);
      }
      .page-btn:hover, .page-btn.active { background:var(--gold); color:#000; border-color:var(--gold); }

      @media(max-width:600px) {
        .admin-topbar { flex-wrap:wrap; gap:10px; }
        .tab-content { padding:20px 12px; }
        .add-form-grid { grid-template-columns:1fr 1fr; }
      }
    </style>
  </head>
  <body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-box">
      <h1><i class="fas fa-wine-bottle" style="margin-left:10px"></i>GINO VINO</h1>
      <p>כניסה לממשק הניהול</p>
      <input type="password" id="passwordInput" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()">כניסה</button>
      <div class="login-error" id="loginError">סיסמה שגויה. נסה שוב.</div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">

    <!-- Topbar -->
    <div class="admin-topbar">
      <h1><i class="fas fa-wine-bottle" style="margin-left:8px"></i>GINO VINO | ניהול</h1>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt" style="margin-left:6px"></i>יציאה</button>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('products', this)"><i class="fas fa-boxes" style="margin-left:6px"></i>מוצרים</button>
      <button class="tab-btn" onclick="switchTab('settings', this)"><i class="fas fa-cog" style="margin-left:6px"></i>הגדרות</button>
      <button class="tab-btn" onclick="switchTab('orders', this)"><i class="fas fa-receipt" style="margin-left:6px"></i>הזמנות</button>
    </div>

    <!-- ═══════════════════════════════════════
        TAB: PRODUCTS
        ═══════════════════════════════════════ -->
    <div class="tab-content active" id="tab-products">

      <!-- Add product form -->
      <div class="add-product-section">
        <h3><i class="fas fa-plus-circle" style="margin-left:8px"></i>הוסף מוצר חדש</h3>
        <div class="add-form-grid">
          <div class="add-form-field"><label>שם מוצר *</label><input type="text" id="new-name" placeholder="שם המוצר"></div>
          <div class="add-form-field">
            <label>קטגוריה *</label>
            <select id="new-category">
              <option value="">בחר קטגוריה</option>
              <option>אניס</option><option>בירות</option><option>ג׳ין</option>
              <option>וודקה</option><option>וויסקי</option><option>וורמוט</option>
              <option>טקילה</option><option>יין</option><option>ליקרים</option>
              <option>קוניאק</option><option>רום</option>
            </select>
          </div>
          <div class="add-form-field"><label>מחיר (₪) *</label><input type="number" id="new-price" placeholder="0.00" min="0" step="0.01"></div>
          <div class="add-form-field"><label>מחיר מבצע (₪)</label><input type="number" id="new-discountPrice" placeholder="0" min="0" step="0.01"></div>
          <div class="add-form-field"><label>עלות (₪)</label><input type="number" id="new-cost" placeholder="0.00" min="0" step="0.01"></div>
          <div class="add-form-field"><label>% אלכוהול</label><input type="number" id="new-alcohol" placeholder="0" min="0" max="100"></div>
          <div class="add-form-field"><label>פעיל במלאי</label>
            <label class="toggle" style="margin-top:4px"><input type="checkbox" id="new-active" checked><span class="toggle-slider"></span></label>
          </div>
        </div>
        <button class="action-btn btn-gold" onclick="addProduct()"><i class="fas fa-plus"></i> הוסף מוצר</button>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <input type="text" class="search-input" id="searchInput" placeholder="חיפוש מוצר..." oninput="renderProductsTable()">
        <select class="cat-filter" id="catFilter" onchange="renderProductsTable()">
          <option value="">כל הקטגוריות</option>
          <option>אניס</option><option>בירות</option><option>ג׳ין</option>
          <option>וודקה</option><option>וויסקי</option><option>וורמוט</option>
          <option>טקילה</option><option>יין</option><option>ליקרים</option>
          <option>קוניאק</option><option>רום</option>
        </select>
        <button class="action-btn btn-green" onclick="saveAllProducts()"><i class="fas fa-save"></i> שמור שינויים</button>
        <button class="action-btn btn-outline" onclick="exportJSON()"><i class="fas fa-download"></i> ייצא JSON</button>
        <label class="action-btn btn-outline" style="cursor:pointer">
          <i class="fas fa-upload"></i> ייבא JSON
          <input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
        </label>
        <button class="action-btn btn-red" onclick="resetToEmbedded()"><i class="fas fa-redo"></i> אפס לברירת מחדל</button>
      </div>

      <!-- Products count -->
      <p style="color:var(--text3);font-size:0.9rem;margin-bottom:12px" id="productCount"></p>

      <!-- Table -->
      <div class="products-table-wrap">
        <table id="productsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>שם מוצר</th>
              <th>קטגוריה</th>
              <th>מחיר ₪</th>
              <th>מבצע ₪</th>
              <th>עלות ₪</th>
              <th>% אלכ׳</th>
              <th>במלאי</th>
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="productsPagination"></div>
    </div>

    <!-- ═══════════════════════════════════════
        TAB: SETTINGS
        ═══════════════════════════════════════ -->
    <div class="tab-content" id="tab-settings">
      <div class="settings-grid">

        <div class="setting-card">
          <h3><i class="fab fa-whatsapp" style="margin-left:8px"></i>וואטסאפ</h3>
          <div class="setting-field">
            <label>מספר וואטסאפ חנות (ללא +, עם קוד מדינה)</label>
            <input type="text" id="set-whatsapp" placeholder="9720536210899">
          </div>
          <div class="setting-field">
            <label>וואטסאפ שליח/חברת משלוחים</label>
            <input type="text" id="set-deliveryWhatsapp" placeholder="972XXXXXXXXX">
          </div>
        </div>

        <div class="setting-card">
          <h3><i class="fas fa-envelope" style="margin-left:8px"></i>אימייל</h3>
          <div class="setting-field">
            <label>אימייל חנות</label>
            <input type="email" id="set-email" placeholder="MAIN@byspace.org">
          </div>
          <div class="setting-field">
            <label>אימייל לאישורי הזמנות</label>
            <input type="email" id="set-deliveryEmail" placeholder="MAIN@byspace.org">
          </div>
        </div>

        <div class="setting-card">
          <h3><i class="fas fa-truck" style="margin-left:8px"></i>משלוח</h3>
          <div class="setting-field">
            <label>עלות משלוח (₪)</label>
            <input type="number" id="set-deliveryPrice" placeholder="30" min="0">
          </div>
          <div class="setting-field">
            <label>שם החנות</label>
            <input type="text" id="set-storeName" placeholder="GINO VINO">
          </div>
        </div>

        <div class="setting-card">
          <h3><i class="fas fa-shield-alt" style="margin-left:8px"></i>גמא (Gamma) סליקה</h3>
          <div class="setting-field">
            <label>מספר מסוף Gamma</label>
            <input type="text" id="set-gammaTerm" placeholder="YOUR_GAMMA_TERMINAL_ID">
          </div>
          <p style="color:var(--text3);font-size:0.82rem;margin-top:8px">
            <i class="fas fa-info-circle" style="margin-left:4px"></i>
            לקבלת מסוף Gamma פנה ל-<a href="https://www.gamma.co.il/" target="_blank" style="color:var(--gold)">gamma.co.il</a>
          </p>
        </div>

      <div class="admin-section">
    <h3>ניהול קופונים</h3>

    <input type="text" id="couponCode" placeholder="קוד קופון (למשל GINO10)">
    
    <input type="number" id="couponDiscount" placeholder="אחוז הנחה (למשל 10)">

    <label style="display:flex;align-items:center;gap:8px;margin:10px 0;color:var(--text2)">
      <input type="checkbox" id="couponFreeShipping">
      משלוח חינם בקופון
    </label>

    <button class="btn-gold" onclick="addNewCoupon()" style="padding:10px 16px;border:none;border-radius:8px">
      צור קופון
    </button>

    <div id="couponsList" style="margin-top:15px"></div>
  </div>



      </div>
      <br>
      <button class="save-settings-btn" onclick="saveSettingsAdmin()"><i class="fas fa-save" style="margin-left:8px"></i>שמור הגדרות</button>
    </div>

    <!-- ═══════════════════════════════════════
        TAB: ORDERS
        ═══════════════════════════════════════ -->
    <div class="tab-content" id="tab-orders">
      <div class="toolbar">
        <h3 style="color:var(--gold)">הזמנות אחרונות</h3>
        <button class="action-btn btn-red" onclick="if(confirm('האם למחוק את כל ההזמנות?')){localStorage.removeItem('ginoOrders');renderOrders();}">
          <i class="fas fa-trash"></i> מחק הכל
        </button>
      </div>
      <div id="ordersContainer"></div>
    </div>

  </div>

  <!-- Save toast -->
  <div class="save-toast" id="saveToast">✓ נשמר בהצלחה!</div>

  <script src="products.js"></script>
  <script>


  renderCoupons();
    /* ──────────────────────────────────────
      ADMIN PASSWORD (change here or in settings)
      Default: ginoadmin123
      ────────────────────────────────────── */
    const ADMIN_PASSWORD = 'gino';

    /* ── Pagination state ── */
    const PAGE_SIZE = 50;
    let currentPage = 1;
    let filteredProducts = [];

    /* ══════════════════════════════════════
      LOGIN / LOGOUT
      ══════════════════════════════════════ */
    function doLogin() {
      const val = document.getElementById('passwordInput').value;
      if (val === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display  = 'block';
        sessionStorage.setItem('ginoAdmin','1');
        initAdmin();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function doLogout() {
      sessionStorage.removeItem('ginoAdmin');
      location.reload();
    }

    /* Check if already logged in */
    if (sessionStorage.getItem('ginoAdmin') === '1') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display  = 'block';
      document.addEventListener('DOMContentLoaded', initAdmin);
    }

    document.getElementById('passwordInput')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    /* ══════════════════════════════════════
      INIT ADMIN
      ══════════════════════════════════════ */
    function initAdmin() {
      renderProductsTable();
      loadSettingsAdmin();
      renderOrders();
    }

    /* ══════════════════════════════════════
      TABS
      ══════════════════════════════════════ */
    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tabId)?.classList.add('active');
      btn?.classList.add('active');
      if (tabId === 'products') renderProductsTable();
      if (tabId === 'orders')   renderOrders();
    }

    /* ══════════════════════════════════════
      PRODUCTS TABLE
      ══════════════════════════════════════ */
    function renderProductsTable() {
      const query  = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
      const cat    = document.getElementById('catFilter')?.value || '';
      const prods  = getProducts();

      filteredProducts = prods.filter(p => {
        const matchSearch = !query || p.name.toLowerCase().includes(query) || (p.category || '').toLowerCase().includes(query);
        const matchCat    = !cat   || p.category === cat;
        return matchSearch && matchCat;
      });

      const countEl = document.getElementById('productCount');
      if (countEl) countEl.textContent = `מציג ${filteredProducts.length} מתוך ${prods.length} מוצרים`;

      renderPage(1);
      renderPagination();
    }

    function renderPage(page) {
      currentPage = page;
      const start  = (page - 1) * PAGE_SIZE;
      const slice  = filteredProducts.slice(start, start + PAGE_SIZE);
      const tbody  = document.getElementById('productsTableBody');
      if (!tbody) return;

      tbody.innerHTML = '';
      slice.forEach((p, localIdx) => {
        const globalIdx = getProducts().findIndex(x => x.name === p.name && x.category === p.category);
        const row = document.createElement('tr');
        row.innerHTML = `
          <td style="color:var(--text3);font-size:0.8rem">${globalIdx + 1}</td>
          <td class="prod-name">${p.name}</td>
          <td>${p.category || ''}</td>
          <td><input type="number" class="inline-input" value="${p.price}" onchange="updateField(${globalIdx},'price',+this.value)"></td>
          <td><input type="number" class="inline-input" value="${p.discountPrice || 0}" onchange="updateField(${globalIdx},'discountPrice',+this.value)"></td>
          <td><input type="number" class="inline-input" value="${p.cost || 0}" onchange="updateField(${globalIdx},'cost',+this.value)"></td>
          <td><input type="number" class="inline-input" style="width:60px" value="${p.alcoholPercent || 0}" onchange="updateField(${globalIdx},'alcoholPercent',+this.value)"></td>
          <td>
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox" ${p.isActive ? 'checked' : ''} onchange="updateField(${globalIdx},'isActive',this.checked)">
                <span class="toggle-slider"></span>
              </label>
              <span class="${p.isActive ? 'badge-active' : 'badge-inactive'}">${p.isActive ? 'במלאי' : 'אזל'}</span>
            </div>
          </td>
          <td>
            <button class="delete-btn" onclick="deleteProduct(${globalIdx})" title="מחק מוצר"><i class="fas fa-trash"></i></button>
          </td>`;
        tbody.appendChild(row);
      });

      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredProducts.length / PAGE_SIZE);
      const container  = document.getElementById('productsPagination');
      if (!container) return;
      container.innerHTML = '';
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => renderPage(i);
        container.appendChild(btn);
      }
    }

    function updateField(idx, field, value) {
      const prods = getProducts();
      if (!prods[idx]) return;
      prods[idx][field] = value;
      saveProducts(prods);
    }

    function deleteProduct(idx) {
      if (!confirm('האם למחוק מוצר זה?')) return;
      const prods = getProducts();
      prods.splice(idx, 1);
      saveProducts(prods);
      renderProductsTable();
      showToast('המוצר נמחק');
    }

    function addProduct() {
      const name  = document.getElementById('new-name')?.value.trim();
      const cat   = document.getElementById('new-category')?.value;
      const price = parseFloat(document.getElementById('new-price')?.value) || 0;
      const disc  = parseFloat(document.getElementById('new-discountPrice')?.value) || 0;
      const cost  = parseFloat(document.getElementById('new-cost')?.value) || 0;
      const alc   = parseFloat(document.getElementById('new-alcohol')?.value) || 0;
      const active= document.getElementById('new-active')?.checked ?? true;

      if (!name || !cat || price <= 0) {
        alert('יש למלא שם, קטגוריה ומחיר');
        return;
      }

      const prods = getProducts();
      prods.push({ name, category: cat, price, discountPrice: disc, cost, alcoholPercent: alc, isActive: active });
      saveProducts(prods);

      // Clear form
      ['new-name','new-price','new-discountPrice','new-cost','new-alcohol'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });

      renderProductsTable();
      showToast('המוצר נוסף!');
    }

    function saveAllProducts() {
      // Products are saved on each inline change already; this just triggers toast
      showToast('כל השינויים נשמרו!');
    }

    function exportJSON() {
      const prods = getProducts();
      const blob  = new Blob([JSON.stringify(prods, null, 2)], { type: 'application/json' });
      const url   = URL.createObjectURL(blob);
      const a     = document.createElement('a');
      a.href     = url;
      a.download = 'gino-products.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importJSON(event) {
      const file   = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) { alert('קובץ JSON לא תקין'); return; }
          saveProducts(data);
          renderProductsTable();
          showToast(`יובאו ${data.length} מוצרים`);
        } catch(err) { alert('שגיאה בקריאת הקובץ: ' + err.message); }
      };
      reader.readAsText(file);
    }

    function resetToEmbedded() {
      if (!confirm('האם לאפס את כל המוצרים לברירת המחדל? פעולה זו לא ניתנת לביטול.')) return;
      localStorage.removeItem('ginoProducts');
      renderProductsTable();
      showToast('אופס לנתוני ברירת המחדל');
    }

    /* ══════════════════════════════════════
      SETTINGS
      ══════════════════════════════════════ */
    function loadSettingsAdmin() {
      const s = (typeof getSettings === 'function') ? getSettings() : {};
      const fields = {
        'set-whatsapp':         s.whatsapp || '',
        'set-deliveryWhatsapp': s.deliveryWhatsapp || '',
        'set-email':            s.email || '',
        'set-deliveryEmail':    s.deliveryEmail || '',
        'set-deliveryPrice':    s.deliveryPrice || 30,
        'set-storeName':        s.storeName || 'GINO VINO',
        'set-gammaTerm':        s.gammaTerminal || ''
      };
      Object.entries(fields).forEach(([id, val]) => {
        const el = document.getElementById(id);
        if (el) el.value = val;
      });
    }

    function saveSettingsAdmin() {
      const s = {
        whatsapp:         document.getElementById('set-whatsapp')?.value.trim(),
        deliveryWhatsapp: document.getElementById('set-deliveryWhatsapp')?.value.trim(),
        email:            document.getElementById('set-email')?.value.trim(),
        deliveryEmail:    document.getElementById('set-deliveryEmail')?.value.trim(),
        deliveryPrice:    parseFloat(document.getElementById('set-deliveryPrice')?.value) || 30,
        storeName:        document.getElementById('set-storeName')?.value.trim() || 'GINO VINO',
        gammaTerminal:    document.getElementById('set-gammaTerm')?.value.trim()
      };
      if (typeof saveSettings === 'function') saveSettings(s);
      showToast('ההגדרות נשמרו!');
    }

    /* ══════════════════════════════════════
      ORDERS
      ══════════════════════════════════════ */
    function renderOrders() {
      const container = document.getElementById('ordersContainer');
      if (!container) return;
      const orders = (typeof getOrders === 'function') ? getOrders() : [];

      if (!orders.length) {
        container.innerHTML = '<p style="color:var(--text3);text-align:center;padding:40px">אין הזמנות שמורות עדיין.</p>';
        return;
      }

      container.innerHTML = '';
      orders.forEach(order => {
        const card = document.createElement('div');
        card.className = 'order-card';

        const itemsList = (order.items || []).map(i => {
          const ep = (i.discountPrice && i.discountPrice > 0 && i.discountPrice < i.price) ? i.discountPrice : i.price;
          return `• ${i.name} x${i.qty} = ₪${(ep * i.qty).toFixed(2)}`;
        }).join('<br>');

        const waMsg = buildWAMsg(order);

        card.innerHTML = `
          <div class="order-header">
            <span class="order-id">${order.orderId || 'ללא מספר'}</span>
            <span class="order-date">${order.date ? new Date(order.date).toLocaleString('he-IL') : ''}</span>
            <span class="order-total">₪${order.total?.toFixed(2) || '0'}</span>
          </div>
          <div class="order-items">
            <strong>${order.fullname || ''}</strong> | ${order.phone || ''} | ${order.email || ''}<br>
            ${order.delivery === 'delivery' ? `📦 משלוח: ${order.address || ''}, ${order.city || ''}` : `🏪 איסוף עצמי`}<br><br>
            ${itemsList}
          </div>
          <button class="order-wa-btn" onclick="window.open('https://wa.me/9720536210899?text=${encodeURIComponent(waMsg)}','_blank')">
            <i class="fab fa-whatsapp" style="margin-left:6px"></i>שלח וואטסאפ
          </button>`;
        container.appendChild(card);
      });
    }

    function buildWAMsg(order) {
      let lines = [`הזמנה ${order.orderId} - GINO VINO`,`שם: ${order.fullname}`,`טלפון: ${order.phone}`,''];
      (order.items||[]).forEach(i => {
        const ep = (i.discountPrice&&i.discountPrice>0&&i.discountPrice<i.price) ? i.discountPrice : i.price;
        lines.push(`- ${i.name} x${i.qty} = ₪${(ep*i.qty).toFixed(2)}`);
      });
      lines.push(``,`סה"כ: ₪${order.total?.toFixed(2)||0}`);
      return lines.join('\n');
    }

    /* ══════════════════════════════════════
      TOAST
      ══════════════════════════════════════ */
    function showToast(msg = 'נשמר!') {
      const toast = document.getElementById('saveToast');
      if (!toast) return;
      toast.textContent = '✓ ' + msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    /* Init if already logged in */
    window.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem('ginoAdmin') === '1') initAdmin();
    });

  function addNewCoupon() {
  const code = document.getElementById('couponCode').value.trim();
  const discount = parseFloat(document.getElementById('couponDiscount').value) || 0;
  const freeShipping = document.getElementById('couponFreeShipping').checked;

  if (!code) return alert('חסר קוד קופון');

  const coupons = JSON.parse(localStorage.getItem('ginoCoupons') || '[]');

  if (coupons.find(c => c.code === code)) {
    return alert('קופון כבר קיים');
  }

  coupons.push({ code, discount, freeShipping });

  localStorage.setItem('ginoCoupons', JSON.stringify(coupons));

  document.getElementById('couponCode').value = '';
  document.getElementById('couponDiscount').value = '';
  document.getElementById('couponFreeShipping').checked = false;

  renderCoupons();
  showToast('קופון נוצר');
}

function renderCoupons() {
  const box = document.getElementById('couponsList');
  const coupons = JSON.parse(localStorage.getItem('ginoCoupons') || '[]');

  box.innerHTML = coupons.map((c, i) => `
    <div style="background:#1a1a1a;padding:10px;border-radius:8px;margin-top:8px;border:1px solid rgba(212,175,55,0.2)">
      <b>${c.code}</b> | ${c.discount}% הנחה
      ${c.freeShipping ? ' | 🚚 משלוח חינם' : ''}

      <button onclick="deleteCoupon(${i})"
        style="margin-right:10px;background:red;color:#fff;border:none;padding:5px 8px;border-radius:6px;cursor:pointer">
        מחיקה
      </button>
    </div>
  `).join('');
}
function deleteCoupon(index) {
  const coupons = JSON.parse(localStorage.getItem('ginoCoupons') || '[]');

  coupons.splice(index, 1);

  localStorage.setItem('ginoCoupons', JSON.stringify(coupons));

  renderCoupons();
  showToast('קופון נמחק');
}
window.addEventListener('DOMContentLoaded', () => {
  renderCoupons();
});
